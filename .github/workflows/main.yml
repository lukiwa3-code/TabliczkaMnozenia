name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz pliki z repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ustaw Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Ustaw Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Znajdz folder projektu
        shell: bash
        run: |
          if [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Projekt jest w głównym folderze repozytorium."
          elif [ -f "TabliczkaMnozenia/settings.gradle" ]; then
            echo "PROJECT_DIR=TabliczkaMnozenia" >> "$GITHUB_ENV"
            echo "Projekt jest w folderze TabliczkaMnozenia."
          else
            echo "Nie znaleziono pliku settings.gradle."
            echo "Pokażę pliki, które są w repozytorium:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

      - name: Zbuduj APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon

      - name: Skopiuj APK do folderu output
        shell: bash
        run: |
          mkdir -p output
          cp "$PROJECT_DIR"/app/build/outputs/apk/debug/*.apk output/TabliczkaMnozenia-debug.apk

      - name: Zapisz APK do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: TabliczkaMnozenia-debug-apk
          path: output/TabliczkaMnozenia-debug.apk
          if-no-files-found: error
